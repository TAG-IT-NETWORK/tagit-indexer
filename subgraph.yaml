specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: TAGITAgentIdentity
    network: optimism-sepolia
    source:
      address: "0xA7f34FD595eBc397Fe04DcE012dbcf0fbbD2A78D"
      abi: TAGITAgentIdentity
      startBlock: 39774582
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Protocol
        - Agent
        - AgentMetadata
        - AgentStatusChange
      abis:
        - name: TAGITAgentIdentity
          file: ./abis/TAGITAgentIdentity.json
      eventHandlers:
        - event: AgentRegistered(indexed uint256,indexed address,indexed address,string)
          handler: handleAgentRegistered
        - event: AgentURIUpdated(indexed uint256,string)
          handler: handleAgentURIUpdated
        - event: AgentWalletUpdated(indexed uint256,indexed address,indexed address)
          handler: handleAgentWalletUpdated
        - event: AgentMetadataSet(indexed uint256,string,string)
          handler: handleAgentMetadataSet
        - event: AgentStatusChanged(indexed uint256,uint8,uint8)
          handler: handleAgentStatusChanged
      file: ./src/handlers/agent-identity.ts

  - kind: ethereum
    name: TAGITAgentReputation
    network: optimism-sepolia
    source:
      address: "0x57CCa1974DFE29593FBd24fdAEE1cD614Bfd6E4a"
      abi: TAGITAgentReputation
      startBlock: 39774582
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Protocol
        - Agent
        - Feedback
      abis:
        - name: TAGITAgentReputation
          file: ./abis/TAGITAgentReputation.json
      eventHandlers:
        - event: FeedbackGiven(indexed uint256,indexed uint256,indexed address,uint8)
          handler: handleFeedbackGiven
        - event: FeedbackRevoked(indexed uint256,indexed uint256)
          handler: handleFeedbackRevoked
        - event: ResponseAppended(indexed uint256,indexed uint256)
          handler: handleResponseAppended
      file: ./src/handlers/agent-reputation.ts

  - kind: ethereum
    name: TAGITAgentValidation
    network: optimism-sepolia
    source:
      address: "0x9806919185F98Bd07a64F7BC7F264e91939e86b7"
      abi: TAGITAgentValidation
      startBlock: 39774582
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Protocol
        - Agent
        - ValidationRequest
        - ValidationResponse
      abis:
        - name: TAGITAgentValidation
          file: ./abis/TAGITAgentValidation.json
      eventHandlers:
        - event: ValidationRequested(indexed uint256,indexed uint256,indexed address,bool)
          handler: handleValidationRequested
        - event: ValidationResponseSubmitted(indexed uint256,indexed uint256,indexed address,uint8)
          handler: handleValidationResponseSubmitted
        - event: ValidationFinalized(indexed uint256,indexed uint256,bool,uint256)
          handler: handleValidationFinalized
      file: ./src/handlers/agent-validation.ts
