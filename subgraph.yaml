specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # ── wTAG Token (TAGITToken ERC-20) ──
  - kind: ethereum
    name: TAGITToken
    network: base-sepolia
    source:
      address: "0x5f98B83cD7Aef769cc51D2FB739BA49D561170DE"
      abi: TAGITToken
      startBlock: 39611546
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Protocol
        - WTagAccount
        - WTagTransfer
        - WTagApproval
        - WTagMint
        - WTagBurn
        - WTagEmissionsConfig
        - WTagUpgrade
      abis:
        - name: TAGITToken
          file: ./abis/TAGITToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleWTagTransfer
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleWTagApproval
        - event: TokensMinted(indexed address,uint256,uint256)
          handler: handleTokensMinted
        - event: TokensBurned(indexed address,uint256,uint256)
          handler: handleTokensBurned
        - event: EmissionsAddressSet(indexed address,indexed address)
          handler: handleEmissionsAddressSet
        - event: ContractUpgraded(indexed address,string)
          handler: handleContractUpgraded
      file: ./src/handlers/wtag.ts

