  # ── Agent Reputation ──
  - kind: ethereum
    name: TAGITAgentReputation
    network: base-sepolia
    source:
      address: "0x32be6C82A57d5bCe897538d7dA4109eA0eeB0aA1"
      abi: TAGITAgentReputation
      startBlock: 39611546
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Protocol
        - Agent
        - Feedback
      abis:
        - name: TAGITAgentReputation
          file: ./abis/TAGITAgentReputation.json
      eventHandlers:
        - event: FeedbackGiven(indexed uint256,indexed uint256,indexed address,uint8)
          handler: handleFeedbackGiven
        - event: FeedbackRevoked(indexed uint256,indexed uint256)
          handler: handleFeedbackRevoked
        - event: ResponseAppended(indexed uint256,indexed uint256)
          handler: handleResponseAppended
      file: ./src/handlers/agent-reputation.ts

  # ── Agent Validation ──
  - kind: ethereum
    name: TAGITAgentValidation
    network: base-sepolia
    source:
      address: "0x34766dBa7040C2c8817f1Ee1e448209826DD607e"
      abi: TAGITAgentValidation
      startBlock: 39611546
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Protocol
        - Agent
        - ValidationRequest
        - ValidationResponse
      abis:
        - name: TAGITAgentValidation
          file: ./abis/TAGITAgentValidation.json
      eventHandlers:
        - event: ValidationRequested(indexed uint256,indexed uint256,indexed address,bool)
          handler: handleValidationRequested
        - event: ValidationResponseSubmitted(indexed uint256,indexed uint256,indexed address,uint8)
          handler: handleValidationResponseSubmitted
        - event: ValidationFinalized(indexed uint256,indexed uint256,bool,uint256)
          handler: handleValidationFinalized
      file: ./src/handlers/agent-validation.ts

  # ── Core Lifecycle (TAGITCore) — merged from subgraph-arbitrum.yaml during Base migration 2026-06-27 ──
  - kind: ethereum
    name: TAGITCore
    network: base-sepolia
    source:
      address: "0x3adC7eFdB58Ae85483Eff5D4966D916185F31D1d"
      abi: TAGITCore
      startBlock: 39611546
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - CoreProtocol
        - Asset
        - StateTransition
        - CustodyChange
        - ResolveApproval
      abis:
        - name: TAGITCore
          file: ./abis/TAGITCore.json
      eventHandlers:
        - event: AssetMinted(indexed uint256,indexed address,bytes32)
          handler: handleAssetMinted
        - event: StateChanged(indexed uint256,uint8,uint8,address)
          handler: handleStateChanged
        - event: TagBound(indexed uint256,indexed bytes32)
          handler: handleTagBound
        - event: CustodyTransfer(indexed uint256,uint8,uint8,indexed address,indexed address,uint256,bytes32)
          handler: handleCustodyTransfer
        - event: ResolveApproved(indexed uint256,indexed address,uint256)
          handler: handleResolveApproved
      file: ./src/handlers/tagicore.ts

  # ── Robotic Authorizer — merged from subgraph-arbitrum.yaml during Base migration 2026-06-27 ──
  - kind: ethereum
    name: RoboticAuthorizer
    network: base-sepolia
    source:
      address: "0x5c38684D87E826589eC5ED401d94C9671CAe9F40"
      abi: RoboticAuthorizer
      startBlock: 39611546
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - RobotAuthorization
        - ObjectSecurityConfig
      abis:
        - name: RoboticAuthorizer
          file: ./abis/RoboticAuthorizer.json
      eventHandlers:
        - event: RobotActionAuthorized(indexed address,indexed uint256,uint256,bytes32,indexed uint256)
          handler: handleRobotActionAuthorized
        - event: ObjectSafetyClassUpdated(indexed uint256,uint8,uint8)
          handler: handleObjectSafetyClassUpdated
        - event: ObjectZoneUpdated(indexed uint256,bytes32,bytes32)
          handler: handleObjectZoneUpdated
        - event: ObjectProhibitedActionsUpdated(indexed uint256,uint256,uint256)
          handler: handleObjectProhibitedActionsUpdated
      file: ./src/handlers/robotauthorizer.ts
